name: OSINT Daily Scanner

# 1. THE TRIGGERS (When should this run?)
on:
  schedule:
    # Runs every day at 2:30 AM UTC (which is 8:00 AM IST)
    - cron: '30 2 * * *'
  # This line lets us click a "Run" button manually to test it!
  workflow_dispatch:

jobs:
  run-security-scan:
    # We are telling GitHub to boot up a fresh Ubuntu Linux server
    runs-on: ubuntu-latest

    steps:
      # Step A: Download your code from the repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step B: Install Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Step C: Install your tools (requests, python-dotenv)
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      # Step D: Run the script, injecting the secret vault into the environment
      - name: Execute Scanner
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python ssl_checker.py
